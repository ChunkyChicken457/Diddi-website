<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market. — Online Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf8f4;--ink:#1a1208;--muted:#6b5e4e;--accent:#c8622a;--border:#e8e0d4;--card:#ffffff}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
header{background:var(--ink);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--cream);letter-spacing:0.02em}
.logo span{color:#e8a87c}
.cart-btn{background:var(--accent);color:white;border:none;padding:0.5rem 1.2rem;border-radius:6px;font-size:0.85rem;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:opacity 0.2s}
.cart-btn:hover{opacity:0.85}
.search-bar{display:flex;gap:8px;padding:1.5rem 2rem;background:#f2ede5;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-bar input{flex:1;min-width:180px;padding:0.6rem 1rem;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.9rem;background:white;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar select{padding:0.6rem 0.8rem;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.85rem;background:white;cursor:pointer;outline:none}
.result-count{padding:1rem 2rem 0;font-size:0.85rem;color:var(--muted);max-width:1200px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.25rem;padding:1.25rem 2rem 2rem;max-width:1200px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.1)}
.card-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:4rem;background:linear-gradient(135deg,#f5ede0,#ede0cd)}
.card-body{padding:1rem;flex:1;display:flex;flex-direction:column;gap:6px}
.badge{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);font-weight:500}
.card-name{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.3;color:var(--ink)}
.card-desc{font-size:0.8rem;color:var(--muted);line-height:1.5;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)}
.price{font-size:1.15rem;font-weight:500;color:var(--ink)}
.stars{color:#e8a87c;font-size:0.85rem}
.rating-count{font-size:0.75rem;color:var(--muted)}
.buy-btn{background:var(--ink);color:var(--cream);border:none;padding:0.5rem 1rem;border-radius:6px;font-size:0.8rem;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;transition:background 0.2s;display:inline-block;white-space:nowrap}
.buy-btn:hover{background:var(--accent)}
.tag{display:inline-block;font-size:0.7rem;background:#f0e8d8;color:var(--muted);padding:2px 8px;border-radius:20px;margin-right:4px;margin-top:4px}
.discount{font-size:0.75rem;color:#cc2200;font-weight:500}
.orig-price{text-decoration:line-through;color:var(--muted);font-size:0.85rem}
.empty{text-align:center;padding:4rem;color:var(--muted);font-size:1rem;grid-column:1/-1}
footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;border-top:1px solid var(--border);margin-top:2rem}
</style>
</head>
<body>

<header>
  <div class="logo">Market<span>.</span></div>
  <button class="cart-btn" id="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</button>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search products..." oninput="filterProducts()">
  <select id="category" onchange="filterProducts()">
    <option value="">All categories</option>
  </select>
  <select id="sort" onchange="filterProducts()">
    <option value="default">Sort: Featured</option>
    <option value="price-asc">Price: Low to High</option>
    <option value="price-desc">Price: High to Low</option>
    <option value="rating">Top Rated</option>
    <option value="discount">Biggest Discount</option>
  </select>
</div>

<p class="result-count" id="result-count"></p>
<div class="grid" id="grid"></div>

<footer>Market. &mdash; Products link to real stores. Prices and availability vary.</footer>

<script>
const emojis={
  Electronics:['📱','💻','🎧','📷','🖥️','⌚','🎮','📺','🔋','🖨️'],
  Fashion:['👔','👗','👠','👜','🧥','🧣','👒','💍','🕶️','🧤'],
  Home:['🛋️','🪴','🕯️','🧴','🍳','🪞','🛏️','🪣','🔧','🪑'],
  Books:['📚','📖','📔','📓','🗒️','📕','📗','📘','📙','🗺️'],
  Sports:['⚽','🏋️','🎾','🏊','🚴','🧗','🥊','🏒','🎯','🪃'],
  Beauty:['💄','🧴','💅','🧼','🪥','💊','🌸','✨','🧖','🫧'],
  Food:['🍫','☕','🍷','🧀','🫙','🍵','🥜','🫒','🌶️','🍯'],
  Garden:['🌱','🪻','🌿','🪓','🧲','💧','🌻','🍀','🌾','🪨']
};
const stores=[
  {name:'Amazon',base:'https://www.amazon.com/s?k='},
  {name:'eBay',base:'https://www.ebay.com/sch/i.html?_nkw='},
  {name:'Etsy',base:'https://www.etsy.com/search?q='},
  {name:'Walmart',base:'https://www.walmart.com/search?q='},
  {name:'Target',base:'https://www.target.com/s?searchTerm='}
];
const adj=['Premium','Essential','Deluxe','Pro','Classic','Ultra','Artisan','Vintage','Smart','Organic','Signature','Elite','Compact','Portable','Luxe'];
const nouns={
  Electronics:['Wireless Earbuds','Gaming Headset','Smart Watch','Portable Charger','Bluetooth Speaker','Laptop Stand','LED Desk Lamp','USB Hub','Webcam','Mechanical Keyboard'],
  Fashion:['Linen Blazer','Silk Scarf','Leather Tote','Knit Sweater','Canvas Sneakers','Denim Jacket','Cashmere Beanie','Wool Coat','Crossbody Bag','Platform Boots'],
  Home:['Soy Wax Candle','Bamboo Organizer','Linen Throw Pillow','Rattan Basket','Cast Iron Pan','Ceramic Planter','Marble Coaster Set','Cork Trivet','Linen Duvet','Acacia Cutting Board'],
  Books:['Thriller Novel','Cookbook','Self-Help Guide','Travel Memoir','Science Fiction','Fantasy Saga','Art History','Psychology Book','Short Story Collection','Poetry Anthology'],
  Sports:['Yoga Mat','Resistance Bands','Jump Rope','Foam Roller','Running Shorts','Gym Gloves','Water Bottle','Knee Sleeve','Adjustable Dumbbell','Running Socks'],
  Beauty:['Face Serum','Eye Cream','Lip Balm Set','Rose Toner','Vitamin C Moisturiser','Hydrating Mask','Micellar Water','Brow Pencil','Blush Palette','Hair Mask'],
  Food:['Dark Chocolate Box','Specialty Coffee','Olive Oil','Hot Sauce Set','Artisan Honey','Loose Leaf Tea','Mixed Nuts','Truffle Salt','Pasta Bundle','Spice Kit'],
  Garden:['Succulent Set','Herb Seeds Kit','Trowel Set','Watering Can','Grow Bag','Solar Light','Compost Bin','Plant Labels','Pruning Shears','Garden Kneeler']
};
const descs={
  Electronics:'High-performance tech designed for the modern lifestyle.',
  Fashion:'Timeless style crafted from premium materials.',
  Home:'Elevate your space with thoughtful everyday essentials.',
  Books:'Expand your horizons with expertly curated reading.',
  Sports:'Performance gear for every level of fitness.',
  Beauty:'Science-backed formulas for your best skin.',
  Food:'Gourmet flavours sourced from around the world.',
  Garden:'Everything you need for a thriving garden.'
};

function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function randNum(min,max){return Math.floor(Math.random()*(max-min+1))+min}

function generateProducts(n=48){
  const cats=Object.keys(nouns);
  return Array.from({length:n},(_,i)=>{
    const cat=rand(cats);
    const name=rand(adj)+' '+rand(nouns[cat]);
    const basePrice=randNum(8,320);
    const hasDiscount=Math.random()>0.45;
    const discountPct=hasDiscount?randNum(10,55):0;
    const price=hasDiscount?+(basePrice*(1-discountPct/100)).toFixed(2):basePrice;
    const origPrice=hasDiscount?basePrice:null;
    const rating=parseFloat((3.2+Math.random()*1.8).toFixed(1));
    const reviews=randNum(12,4800);
    const store=rand(stores);
    const query=encodeURIComponent(name);
    return{id:i,name,cat,emoji:rand(emojis[cat]),price,origPrice,discountPct,rating,reviews,store,url:store.base+query,desc:descs[cat]};
  });
}

const allProducts=generateProducts();
let cartCount=0;

function stars(r){
  const full=Math.floor(r);
  const half=r-full>=0.5?1:0;
  return '★'.repeat(full)+(half?'½':'')+'☆'.repeat(5-full-half);
}

function renderCard(p){
  return `<div class="card" onclick="window.open('${p.url}','_blank')">
    <div class="card-img">${p.emoji}</div>
    <div class="card-body">
      <div class="badge">${p.cat}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-desc">${p.desc}</div>
      <div style="margin-top:4px">${p.discountPct?`<span class="discount">-${p.discountPct}% off</span> <span class="orig-price">$${p.origPrice}</span>`:'<span class="tag">Free shipping</span>'}</div>
      <div class="card-footer">
        <div>
          <div class="price">$${p.price.toFixed(2)}</div>
          <div class="stars">${stars(p.rating)} <span class="rating-count">(${p.reviews.toLocaleString()})</span></div>
        </div>
        <a class="buy-btn" href="${p.url}" target="_blank" onclick="event.stopPropagation();addCart()">
          Buy on ${p.store.name}
        </a>
      </div>
    </div>
  </div>`;
}

function addCart(){
  cartCount++;
  document.getElementById('cart-count').textContent=cartCount;
}

function filterProducts(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('category').value;
  const sort=document.getElementById('sort').value;
  let products=[...allProducts];
  if(q)products=products.filter(p=>p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q));
  if(cat)products=products.filter(p=>p.cat===cat);
  if(sort==='price-asc')products.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc')products.sort((a,b)=>b.price-a.price);
  else if(sort==='rating')products.sort((a,b)=>b.rating-a.rating);
  else if(sort==='discount')products.sort((a,b)=>b.discountPct-a.discountPct);
  document.getElementById('result-count').textContent=`${products.length} product${products.length!==1?'s':''}`;
  document.getElementById('grid').innerHTML=products.length
    ?products.map(renderCard).join('')
    :`<div class="empty">No products found. Try a different search!</div>`;
}

// Populate category dropdown
const cats=[...new Set(allProducts.map(p=>p.cat))].sort();
const sel=document.getElementById('category');
cats.forEach(c=>{
  const o=document.createElement('option');
  o.value=c;o.textContent=c;
  sel.appendChild(o);
});

filterProducts();
</script>
</body>
</html>
